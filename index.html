<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL S.A. | V203 OMNI-TOTAL</title>
    <style>
        :root { --gold: #D4AF37; --accent: #00FF41; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', monospace; }
        body { background: #000; color: #fff; padding-bottom: 140px; }
        .header-sys { padding: 12px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; font-size: 9px; background: #050505; position: sticky; top: 0; z-index: 1000; }
        .box-master { margin: 15px; border: 2px solid var(--gold); border-radius: 12px; padding: 25px; text-align: center; background: radial-gradient(circle, #0a0a0a 0%, #000 100%); }
        .val-moldado { font-size: 38px; font-weight: 900; color: var(--gold); }
        .card { margin: 15px; background: #080808; border: 1px solid #1a1a1a; border-radius: 10px; overflow: hidden; }
        .card-h { padding: 10px 15px; background: #111; font-size: 9px; font-weight: 900; color: var(--gold); border-bottom: 1px solid #222; }
        .card-b { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .field-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        .in-num { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; width: 150px; text-align: center; font-weight: bold; outline: none; }
        .status-sync { font-size: 9px; color: var(--accent); text-align: right; font-weight: 900; margin-top: 5px; }
        .btn-print { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 50px; font-weight: 900; width: 85%; }
    </style>
</head>
<body onload="initSystem()">

<div class="header-sys">
    <span>🛡️ TERMINAL S.A. | V203</span>
    <span id="live-clock">--:--:--</span>
    <span style="color:var(--accent)">● TOTAL SYNC ACTIVE</span>
</div>

<div class="box-master">
    <small style="font-size:9px; color:var(--gold); font-weight: 900;">LUCRO MOLDADO (TRAVA -50%)</small>
    <div class="val-moldado" id="v-mold">R$ 0,00</div>
    <div id="comp-msg" style="font-size: 10px; color: var(--accent); font-weight: bold; margin-top: 8px;">EFICIÊNCIA: 0.00%</div>
</div>

<div class="card">
    <div class="card-h">CONFIGURAÇÃO DE APORTES E ATIVOS</div>
    <div class="card-b">
        <div class="field-row">Aporte Inicial: <input type="number" id="capital" class="in-num" value="1000" oninput="main()"></div>
        <div class="field-row">Aporte Mensal: <input type="number" id="mensal" class="in-num" value="200" oninput="main()"></div>
        <div class="field-row">Ativo/CDB: <input type="text" id="master-in" list="lista-omni" class="in-num" placeholder="Ex: CDB 153%" oninput="processInput(this.value)"></div>
        <div class="field-row">Tempo (Meses): <input type="number" id="meses" class="in-num" value="12" oninput="main()"></div>
        <div class="status-sync" id="sync-msg">Sincronizando...</div>
    </div>
</div>

<div id="datalist-container"></div>

<button class="btn-print" onclick="window.print()">📸 GERAR AUDITORIA V203</button>

<script>
    const API_TOKEN = "3YfY2Nvp75kG9ANMx4vrDx";
    let selicM = Math.pow(1 + 0.1075, 1/12) - 1;
    let currentTax = 0;

    function initSystem() {
        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        fetch('datalist_omni.html').then(r => r.text()).then(d => { document.getElementById('datalist-container').innerHTML = d; });
        main();
    }

    function processInput(val) {
        let input = val.toUpperCase();
        if(input.includes("CDB") || input.includes("CDI") || input.includes("LC")) {
            let num = val.match(/\d+/);
            let perc = num ? parseInt(num[0]) : 100;
            currentTax = selicM * (perc / 100);
            document.getElementById('sync-msg').innerText = `● CDB ${perc}% IDENTIFICADO`;
            main();
        } else if(input.length >= 4) { syncB3(input); }
    }

    async function syncB3(t) {
        try {
            const r = await fetch(`https://brapi.dev/api/quote/${t.toUpperCase()}?token=${API_TOKEN}`);
            const d = await r.json();
            if(d.results[0]) {
                currentTax = d.results[0].regularMarketChangePercent / 100;
                document.getElementById('sync-msg').innerText = `● B3 SYNC: ${t.toUpperCase()}`;
                main();
            }
        } catch(e) {}
    }

    function main() {
        const v0 = parseFloat(document.getElementById('capital').value) || 0;
        const vM = parseFloat(document.getElementById('mensal').value) || 0;
        const t = parseInt(document.getElementById('meses').value) || 1;
        
        // CÁLCULO ACUMULATIVO COM JUROS COMPOSTOS [cite: 2026-01-28]
        let montanteFinal = v0;
        let lucroAcumulado = 0;

        for (let i = 1; i <= t; i++) {
            let rendimentoMes = montanteFinal * currentTax;
            lucroAcumulado += rendimentoMes;
            montanteFinal += rendimentoMes + vM;
        }

        // Aplicação da Trava de -50% no Lucro [cite: 2026-01-16]
        const capitalTotalInvestido = v0 + (vM * t);
        const resultadoMoldado = capitalTotalInvestido + (lucroAcumulado * 0.5);

        document.getElementById('v-mold').innerText = resultadoMoldado.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        
        const cdbRef = capitalTotalInvestido + ((capitalTotalInvestido * selicM * t) * 0.5);
        const eficiencia = ((resultadoMoldado / cdbRef) * 100).toFixed(2);
        document.getElementById('comp-msg').innerText = `EFICIÊNCIA VS BANCO: ${eficiencia}%`;
    }
</script>
</b
    ody>
</html>
