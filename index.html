<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL S.A. | V165 GOLD</title>
    <style>
        :root { --gold: #D4AF37; --bg: #000; --accent: #00FF41; --blue: #00D1FF; --red: #FF3131; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; min-height: 100vh; overflow-y: auto; padding-bottom: 80px; }
        
        /* Oculta tudo no Modo Print exceto o resultado principal */
        body.snapshot .painel-modular, body.snapshot .ticker-tape, body.snapshot .btn-snap, body.snapshot .bar-info { display: none !important; }
        body.snapshot .box-master { margin-top: 100px; border-width: 3px; transform: scale(1.1); }

        .ticker-tape { width: 100%; background: #050505; border-bottom: 1px solid #111; }
        .bar-info { padding: 12px; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; font-size: 10px; background:#050505; }
        
        .box-master { margin: 12px; border: 2px solid var(--gold); border-radius: 12px; padding: 25px; text-align: center; background: #050505; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .box-master.alerta { border-color: var(--red); box-shadow: 0 0 20px rgba(255,49,49,0.4); }
        .val-moldado { font-size: 38px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px rgba(212,175,55,0.3); }
        
        .painel-modular { margin: 10px 12px; background: #050505; border: 1px solid #222; border-radius: 10px; overflow: hidden; }
        .painel-header { padding: 12px 15px; background: #080808; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; }
        .painel-header span { font-size: 9px; font-weight: 900; letter-spacing: 1px; }
        .painel-body { padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        .row-in { display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        .field { background: #111; border: 1px solid #333; color: #fff; padding: 6px; border-radius: 4px; width: 115px; text-align: center; font-weight: bold; outline: none; }
        .field:focus { border-color: var(--gold); }

        .btn-snap { position: fixed; bottom: 20px; right: 20px; background: var(--gold); color: #000; border: none; padding: 12px 22px; border-radius: 30px; font-weight: 900; font-size: 11px; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

<div class="ticker-tape">
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
    { "symbols": [
      {"proName": "BMFBOVESPA:IBOV", "title": "IBOVESPA"},
      {"proName": "BMFBOVESPA:PETR4", "title": "PETR4"},
      {"proName": "BMFBOVESPA:VALE3", "title": "VALE3"},
      {"proName": "FX_IDC:USDBRL", "title": "DÓLAR"}
    ], "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "br" }
    </script>
</div>

<div class="bar-info">
    <span>🛡️ TERMINAL S.A. | V165</span>
    <span style="color:var(--accent)">SISTEMA ATIVO</span>
</div>

<div class="box-master" id="main-box">
    <small style="font-size:8px; color:var(--gold); font-weight:900; letter-spacing: 2px;">LUCRO MOLDADO (-50%)</small>
    <div class="val-moldado" id="v-mold">R$ 0,00</div>
</div>

<div class="painel-modular">
    <div class="painel-header"><span style="color:var(--blue)">ESTRUTURA RENDA FIXA</span><b id="res-rf">R$ 0</b></div>
    <div class="painel-body">
        <div class="row-in">Aporte Inicial: <input type="number" id="ini" class="field" value="100" oninput="calc()"></div>
        <div class="row-in">Meses: <input type="number" id="tempo" class="field" value="12" oninput="calc()"></div>
        <div class="row-in">Produto: 
            <select id="prod-rf" class="field" onchange="calc()">
                <option value="0.825">CDB (PÓS-FIXADO)</option>
                <option value="1">LCI / LCA (ISENTO)</option>
            </select>
        </div>
    </div>
</div>

<div class="painel-modular">
    <div class="painel-header"><span style="color:var(--accent)">ESTRUTURA VOLÁTIL B3</span><b id="res-b3">R$ 0</b></div>
    <div class="painel-body">
        <div class="row-in">Ticker: <input type="text" id="ticker" class="field" value="PETR4" onblur="puxarOscilacao()"></div>
        <div class="row-in">Oscilação Mês %: <input type="number" id="osc" class="field" value="1.5" oninput="calc()"></div>
    </div>
</div>

<button class="btn-snap" onclick="document.body.classList.toggle('snapshot')">📸 MODO PRINT</button>

<script>
    const SELIC = 14.75;
    let valorAnterior = 0;

    async function puxarOscilacao() {
        const ticker = document.getElementById('ticker').value.toUpperCase().trim();
        if(ticker.length >= 4) {
            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://brapi.dev/api/quote/'+ticker)}`);
                const json = await response.json();
                const data = JSON.parse(json.contents);
                if(data.results && data.results[0]) {
                    document.getElementById('osc').value = data.results[0].regularMarketChangePercent.toFixed(2);
                    calc();
                }
            } catch (e) { console.log("Erro API"); }
        }
    }

    function calc() {
        const i = parseFloat(document.getElementById('ini').value) || 0;
        const t = Math.max(1, parseInt(document.getElementById('tempo').value) || 0);
        
        // RF
        const rfMult = parseFloat(document.getElementById('prod-rf').value);
        let taxaRF = Math.pow(1 + (SELIC/100), 1/12) - 1;
        let liqRF = i + ((i * Math.pow(1 + taxaRF, t) - i) * rfMult);

        // B3
        const osc = (parseFloat(document.getElementById('osc').value) || 0) / 100;
        let liqB3 = i * Math.pow(1 + osc, t);

        document.getElementById('main-box').classList.toggle('alerta', osc < 0);
        document.getElementById('res-rf').innerText = "R$ " + liqRF.toLocaleString('pt-BR', {maximumFractionDigits:0});
        document.getElementById('res-b3').innerText = "R$ " + liqB3.toLocaleString('pt-BR', {maximumFractionDigits:0});

        let moldado = i + ((((liqRF + liqB3) / 2) - i) * 0.5);
        document.getElementById('v-mold').innerText = "R$ " + (i > 0 ? moldado.toLocaleString('pt-BR', {minimumFractionDigits:2}) : "0,00");
    }
    calc();
</script>
<
    /body>
</html>
